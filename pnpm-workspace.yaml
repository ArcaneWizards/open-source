packages:
  - 'apps/*'
  - 'packages/*'
minimumReleaseAge: 10080 # 7 days
minimumReleaseAgeStrict: true
blockExoticSubdeps: false # TODO: https://github.com/ArcaneWizards/open-source/issues/73
minimumReleaseAgeExclude:
  - '@arcanejs/diff@0.6.0'
  - '@arcanejs/protocol@0.9.0'
  - '@arcanejs/react-toolkit@0.16.0'
  - '@arcanejs/toolkit-frontend@0.12.0'
  - '@arcanejs/toolkit@9.0.0'
allowBuilds:
  '@arcanewizards/electron-media-service': true
  '@parcel/watcher': true
  electron: true
  electron-winstaller: true
  esbuild: false
  fs-xattr: true
  lzma-native: true
  macos-alias: true
  unrs-resolver: true
