on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      macos_build_requested:
        required: false
        type: boolean
      windows_build_requested:
        required: false
        type: boolean
      # Should build signing etc.. take place,
      # This will only work on the main branch as access to protected environments is required
      notarize:
        required: true
        type: boolean

jobs:
  pre-release-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      pnpm_version: ${{ steps.version.outputs.pnpm_version }}
      require_desktop_release: ${{ steps.check_release.outputs.require_desktop_release }}
      app_dir: ${{ steps.version.outputs.app_dir }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Determine version & key path variables
        id: version
        run: |
          # Get the version from the package.json
          VERSION=v$(cat apps/${{ inputs.app }}-desktop/package.json | jq -r '.version')

          # Check that this matches the version in the server code
          SERVER_VERSION=v$(cat apps/${{ inputs.app }}/package.json | jq -r '.version')
          if [ "$VERSION" != "$SERVER_VERSION" ]; then
            echo "Version mismatch between desktop (${VERSION}) and server (${SERVER_VERSION})"
            exit 1
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${{ inputs.app }}-desktop@${VERSION}" >> $GITHUB_OUTPUT

          # Get the pnpm version that we need to use
          PNPM_VERSION=$(cat package.json | grep '"packageManager": "pnpm@' | sed 's/.*"pnpm@\([^"]*\)".*/\1/')
          echo "pnpm_version=${PNPM_VERSION}" >> $GITHUB_OUTPUT

          # Get the directory of the app being built
          echo "app_dir=apps/${{ inputs.app }}-desktop" >> $GITHUB_OUTPUT
      - name: Check if this workflow run requires a release to be published
        id: check_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # If the workflow is not running on main,
          # we can skip the release check since we won't be releasing from branches
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Not on main branch, skipping release check."
            echo "require_desktop_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Checking if release $TAG exists on GitHub..."
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping desktop build and release."
            echo "require_desktop_release=false" >> $GITHUB_OUTPUT
          else
            echo "Release $TAG does not exist. Desktop build and release will proceed."
            echo "require_desktop_release=true" >> $GITHUB_OUTPUT
          fi
  build-macos:
    runs-on: macos-latest
    environment: ${{ inputs.notarize && 'package' || 'ci' }}
    env:
      APPLE_API_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ vars.APPLE_API_ISSUER }}
    needs:
      - pre-release-checks
    if: inputs.macos_build_requested || needs.pre-release-checks.outputs.require_desktop_release == 'true'
    timeout-minutes: 15
    outputs:
      x64File: ${{ steps.build_vars.outputs.x64File }}
      arm64File: ${{ steps.build_vars.outputs.arm64File }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.20
      - name: Install PNPM
        env:
          PNPM_VERSION: ${{ needs.pre-release-checks.outputs.pnpm_version }}
        run: |
          npm install -g pnpm@$PNPM_VERSION
      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter=@arcanewizards/${{ inputs.app }}-desktop
      - name: Determine build variables
        id: build_vars
        env:
          APP_NAME: ${{ inputs.app }}
          VERSION: ${{ needs.pre-release-checks.outputs.version }}
        run: |
          echo "x64File=out/${APP_NAME}.${VERSION}.Intel.dmg" >> $GITHUB_OUTPUT
          echo "arm64File=out/${APP_NAME}.${VERSION}.Apple Silicon.dmg" >> $GITHUB_OUTPUT

          if [ "${APP_NAME}" == "timecode-toolbox" ]; then
            echo "sourceFile=out/make/Timecode Toolbox Desktop.dmg" >> $GITHUB_OUTPUT
          else
            echo "Unrecognized app name: ${APP_NAME}"
            exit 1;
          fi
      - name: Print build variables
        run: |
          echo "App Directory: ${{ needs.pre-release-checks.outputs.app_dir }}"
          echo "Source File: ${{ steps.build_vars.outputs.sourceFile }}"
          echo "x64 Output: ${{ steps.build_vars.outputs.x64File }}"
          echo "arm64 Output: ${{ steps.build_vars.outputs.arm64File }}"
      - name: Install Apple code-signing certificate
        if: ${{ inputs.notarize }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
      - name: Prepare Apple API Key
        if: ${{ inputs.notarize }}
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          echo -n "$APPLE_API_KEY_BASE64" | base64 --decode -o $RUNNER_TEMP/AuthKey_$APPLE_API_KEY_ID.p8
      - name: Build ${{ steps.build_vars.outputs.x64File }}
        working-directory: ${{ needs.pre-release-checks.outputs.app_dir }}
        env:
          FULL_BUILD: ${{ inputs.notarize && 'true' || 'false' }}
          INPUT: ${{ steps.build_vars.outputs.sourceFile }}
          OUTPUT: ${{ steps.build_vars.outputs.x64File }}
        run: |
          pnpm make --arch=x64
          mv "${INPUT}" "${OUTPUT}"
      - name: Build ${{ steps.build_vars.outputs.arm64File }}
        working-directory: ${{ needs.pre-release-checks.outputs.app_dir }}
        env:
          FULL_BUILD: ${{ inputs.notarize && 'true' || 'false' }}
          INPUT: ${{ steps.build_vars.outputs.sourceFile }}
          OUTPUT: ${{ steps.build_vars.outputs.arm64File }}
        run: |
          pnpm make --arch=arm64
          mv "${INPUT}" "${OUTPUT}"
      - name: Clean up keychain
        if: ${{ always() && inputs.notarize }}
        run: |
          rm -f $RUNNER_TEMP/AuthKey_$APPLE_API_KEY_ID.p8
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
      - name: List files
        run: |
          ls -la ${{ needs.pre-release-checks.outputs.app_dir }}/out/make
          ls -la ${{ needs.pre-release-checks.outputs.app_dir }}/out
      - name: store the macos builds
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: macos-builds
          path: ${{ needs.pre-release-checks.outputs.app_dir }}/out/*.dmg
  skip-macos:
    # Use the same name as the build-macos job to allow branch protection rules to work
    name: build-macos
    needs:
      - pre-release-checks
    if: inputs.macos_build_requested == false && needs.pre-release-checks.outputs.require_desktop_release == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Skip macOS build
        run: echo "Skipping macOS build"
  build-windows:
    needs:
      - pre-release-checks
    if: inputs.windows_build_requested || needs.pre-release-checks.outputs.require_desktop_release == 'true'
    runs-on: windows-latest
    timeout-minutes: 15
    outputs:
      x64File: ${{ steps.build_vars.outputs.x64File }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.20
      - name: Install PNPM
        env:
          PNPM_VERSION: ${{ needs.pre-release-checks.outputs.pnpm_version }}
        run: |
          npm install -g pnpm@$env:PNPM_VERSION
        shell: pwsh
      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter=@arcanewizards/${{ inputs.app }}-desktop
      - name: Determine build variables
        id: build_vars
        env:
          APP_NAME: ${{ inputs.app }}
          VERSION: ${{ needs.pre-release-checks.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          if ($env:APP_NAME -eq "timecode-toolbox") {
            echo "x64File=out/Timecode Toolbox Desktop.$env:VERSION.Setup.exe" >> $env:GITHUB_OUTPUT
          } else {
            echo "Unrecognized app name: $env:APP_NAME"
            exit 1
          }

        shell: pwsh
      - name: Print build variables
        run: |
          echo "x64File Output: ${{ steps.build_vars.outputs.x64File }}"
      - name: Build ${{ steps.build_vars.outputs.x64File }}
        working-directory: ${{ needs.pre-release-checks.outputs.app_dir }}
        env:
          FULL_BUILD: ${{ inputs.notarize && 'true' || 'false' }}
          OUTPUT: ${{ steps.build_vars.outputs.x64File }}
        run: |
          pnpm make --arch=x64
          ls "out/make/squirrel.windows/x64/"
          mv "out/make/squirrel.windows/x64/*.exe" "$env:OUTPUT"
          mv "out/make/squirrel.windows/x64/*.nupkg" "out/"
          mv "out/make/squirrel.windows/x64/RELEASES" "out/"
      - name: store the windows builds
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-builds
          path: ${{ needs.pre-release-checks.outputs.app_dir }}/out/*.exe
  skip-windows:
    # Use the same name as the build-macos job to allow branch protection rules to work
    name: build-windows
    needs:
      - pre-release-checks
    if: inputs.windows_build_requested == false && needs.pre-release-checks.outputs.require_desktop_release == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Skip windows build
        run: echo "Skipping windows build because changes are web-only."
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: needs.pre-release-checks.outputs.require_desktop_release == 'true'
    needs: [pre-release-checks, build-macos, build-windows]
    permissions:
      contents: write
    environment: package
    env:
      OUTPUT_MAC_X64: ${{ needs.build-macos.outputs.x64File }}
      OUTPUT_MAC_ARM64: ${{ needs.build-macos.outputs.arm64File }}
      OUTPUT_WIN_X64: ${{ needs.build-windows.outputs.x64File }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download macOS builds
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-builds
          path: ${{ needs.pre-release-checks.outputs.app_dir }}/out/
      - name: List files
        run: |
          ls -la ${{ needs.pre-release-checks.outputs.app_dir }}/out
          echo OUTPUT_MAC_X64: $OUTPUT_MAC_X64
          echo OUTPUT_MAC_ARM64: $OUTPUT_MAC_ARM64
          echo OUTPUT_WIN_X64: $OUTPUT_WIN_X64
      - name: create release & upload assets
        working-directory: ${{ needs.pre-release-checks.outputs.app_dir }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.pre-release-checks.outputs.tag }}
        run: gh release create --target ${{ github.sha }} "$RELEASE_TAG" "$OUTPUT_MAC_X64" "$OUTPUT_MAC_ARM64"RM64" "$OUTPUT_WIN_X64"
